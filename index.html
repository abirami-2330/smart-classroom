<!DOCTYPE html>
<html>
<head>
<title>College Attendance</title>
<style>
body{font-family:Arial;text-align:center;background:#f4f6f9}
.box{margin:100px auto;padding:20px;width:300px;background:white;border-radius:10px;box-shadow:0 0 10px #ccc}
button{padding:10px;background:#1976d2;color:white;border:none;border-radius:5px;cursor:pointer}
</style>
</head>

<body>

<div class="box">
<h3>📍 College Attendance</h3>

<input type="text" id="name" placeholder="Enter Name"><br><br>

<button onclick="getLocation()">Mark Attendance</button>

<p id="status"></p>
</div>

<script>

// ✅ College Location (Sri Bharathi Engineering College for Women)
const collegeLat = 10.3796;
const collegeLon = 78.8203;

// ✅ Increased radius (IMPORTANT FIX)
const allowedRadius = 1500;

function getLocation(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(success,error,{
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:0
    });
  }else{
    document.getElementById("status").innerHTML="GPS not supported";
  }
}

function success(pos){
  const lat = pos.coords.latitude;
  const lon = pos.coords.longitude;

  const distance = getDistance(lat,lon,collegeLat,collegeLon);

  if(distance <= allowedRadius){
    document.getElementById("status").innerHTML =
    "✅ Attendance Marked<br>Distance: "+Math.round(distance)+" meters";
  }else{
    document.getElementById("status").innerHTML =
    "❌ Outside College ("+Math.round(distance)+" meters)";
  }
}

function error(){
  document.getElementById("status").innerHTML="❌ Allow Location Access";
}

// Distance formula
function getDistance(lat1, lon1, lat2, lon2){
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2)*Math.sin(Δφ/2) +
            Math.cos(φ1)*Math.cos(φ2) *
            Math.sin(Δλ/2)*Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

</script>

</body>
</html>
