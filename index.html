<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GPS Attendance System</title>

<style>
body{
  font-family: Arial;
  background:#eef2f7;
  text-align:center;
}
.card{
  width:350px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
input,button{
  width:90%;
  padding:10px;
  margin:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  background:#1976d2;
  color:white;
  border:none;
  cursor:pointer;
}
#status{
  font-weight:bold;
  margin-top:10px;
}
.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="card">
<h2>📍 College Attendance</h2>

<input id="name" placeholder="Enter Name">

<button onclick="markAttendance()">Mark Attendance</button>

<p id="status"></p>
</div>

<script>

// 📍 Sri Bharathi Engineering College location
const collegeLat = 10.381706;
const collegeLon = 78.820984;

// 📏 Radius (IMPORTANT → increase if needed)
const allowedRadius = 800;

// ⏰ Attendance time
const startHour = 8;
const endHour = 17;

function markAttendance(){

let name = document.getElementById("name").value.trim();
let status = document.getElementById("status");

if(name===""){
status.innerHTML="❌ Enter your name";
status.className="error";
return;
}

// ⏰ TIME CHECK
let now = new Date();
let hour = now.getHours();

if(hour < startHour || hour > endHour){
status.innerHTML="❌ Attendance allowed only during college hours";
status.className="error";
return;
}

// 📍 GPS CHECK
if(!navigator.geolocation){
status.innerHTML="❌ GPS not supported";
status.className="error";
return;
}

status.innerHTML="📡 Checking location...";
status.className="";

navigator.geolocation.getCurrentPosition(

position => {

let userLat = position.coords.latitude;
let userLon = position.coords.longitude;

// Debug (optional)
console.log("User:", userLat, userLon);

let distance = calculateDistance(userLat,userLon,collegeLat,collegeLon);

console.log("Distance:", distance);

// ✅ INSIDE COLLEGE
if(distance <= allowedRadius){

status.innerHTML="✅ Attendance Marked (Inside College)";
status.className="success";

// Save locally (demo)
localStorage.setItem(name, "Present - " + new Date().toLocaleString());

alert("Attendance Marked Successfully");

}else{

status.innerHTML="❌ Outside College ("+Math.round(distance)+" meters)";
status.className="error";

}

},

error => {
status.innerHTML="❌ Please enable location permission";
status.className="error";
},

{
enableHighAccuracy:true,
timeout:15000,
maximumAge:0
}
);

}

// 📏 Distance Formula (Haversine)
function calculateDistance(lat1, lon1, lat2, lon2){

const R = 6371000;

const dLat = (lat2 - lat1) * Math.PI/180;
const dLon = (lon2 - lon1) * Math.PI/180;

const a =
Math.sin(dLat/2) * Math.sin(dLat/2) +
Math.cos(lat1 * Math.PI/180) *
Math.cos(lat2 * Math.PI/180) *
Math.sin(dLon/2) * Math.sin(dLon/2);

const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

return R * c;
}

</script>

</body>
</html>
